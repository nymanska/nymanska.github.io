          pellentesque eu, pretium quis, sem.
            
      - role: Interim Business Development Manager - Energy storage
        time: 2023, May - 2024, April
        company: Solkompaniet, Stockholm (Sweden)
        details: |
          Lead the establishment and growth of a new business area dedicated to battery energy storage 
          systems focusing on utility-scale and commercial and industrial (C&I) projects.
            
      - role: CEO and Product Development Specialist
        time: 2019, May - 2024, April
        company: Nymantech, Stockholm (Sweden)
        details: |
          Founded and established an R&D, and Manufacturing consultant agency that specializes 
          in smart-hardware development and industrialization projects.
            - Successfully executed a full-service product development and industrialization project 
            for a smart-hardware consumer product that launched to the market in 2022.
            - Defined development plans, and funding requirements for multiple hardware startups.
            - Established key partners to support manufacturing activities.
            - Identified and built the engineering and project management team.
            - Executed various technical research, sourcing, and customization projects.

      - role: Technical Director, Air Purification
        time: 2019, May - 2024, Apr
        company: REHAU Polymer (Suzhou) Co., Ltd, Shanghai, Shanghai (China)
        details: |
          An internal startup within the Rehau group that develops smart air purifiers to 
          tackle the increasing indoor air quality problems throughout Asia. Reported to CEO.
            - Co-Established, and managed a hardware startup targeting both B2C and B2B markets.
            - Built and led the internal team supporting R&D, prototype, certification, manufacturing, 
            supply chain, and quality assurance.
            - Established a network of manufacturing and development partners throughout Asia.
            - Managed the development of the REHAU Home IoT platform.
            - Launched two award-winning products to market:
                - BREATHE 1: Smart Air Purifier. Launched to the market in November 2017.
                A Design furniture piece that intelligently cleans indoor air.
                Winner of IF Design Awards 2018
                Winner of Red Dot Design Awards 2018
                - BREATHE 2: Smart Air Purifier. Launched to the market in November 2018.
                A unique air purifier blending design, performance, and function.
                Winner of Red Dot Design Awards 2019

      - role: Founder and CEO
        time: 2016, Feb - 2017, Ap
        company: Nyluft, Nyköping (Sweden)
        details: |
          A startup focused on developing a Swedish high-end smart air purifier. 
          The product concept was aimed at the growing number of Chinese consumers who appreciate 
          craftsmanship, quality, and Scandinavian brands.
            - Identified, and developed a solution to address existing product gaps in the market.
            - Built a global team of consultants, and manufacturing partners to support development.
            - Established a focus group in China to drive the development to a specific market niche.
            - Successfully achieved early-stage funding.
            - Developed, and engineered the product concept and built a minimum viable product.
            - Company was acquired by Rehau in April 2017.
            
      - role: Product manager
        time: 2014, Oct - 2016, Feb
        company: Heatex, Austin (USA)
        details: |
          Heatex is a global market leader for air-to-air cooling solutions for 
          air handling units, electronic cabinets, motors, and wind turbines. 
          Reported to: Group CEO
            - Managed global wind budget, and client key accounts in China, Germany, and USA.
            - Prospected and secured new clients in North America and Europe.
            - Redesigned existing products to decrease supplier dependency and improve sales margins.
            - Managed engineering team in Heatex Shanghai.
            - Prepared turnover forecasts and project pipelines for monthly board meetings.
            - Participated and exhibited in international wind turbine conferences and exhibitions.
            - Created content and directed marketing activities.
            - Invented, drafted, and filed patent applications.
            - Established, and managed new global key suppliers.
            - Drafted and negotiated client bonus agreements.
            - Co-authored white paper publication with a newly developed client.
            - Oversaw hiring of new staff by preparing job ads, conducting interviews, and making hiring decisions.
            
      - role: Technical Manager
        time: 2011, Oct - 2014, Oct
        company: Heatex, Shanghai (USA)
        details: |
          Heatex is a global market leader for air-to-air cooling solutions for 
          air handling units, electronic cabinets, motors, and wind turbines. 
          Reported to GM
            -Developed new and managed existing wind power clients in China and Europe.
            - Oversaw daily activities for products concerning wind and electronic cooling segment.
            - Recruited, trained, and managed a mechanical engineer.
            - Served as a global key account manager for wind segment suppliers, and identified, audited, and developed new suppliers.
            - Contributed to the ramp-up of the Heatex factory from prototype to volume production.
            - Solved numerous client issues related to all parts of the products and installation.

      - role: Applications Engineer
        time: 2010, Nov - 2011, Oct
        company: Heatex, Trelleborg (Sweden)
        details: |
          Reported to Business Area Director
            - Led the development of new prototypes to verify technical and commercial requirements.
            - Prepared business proposals and secured deals for smaller projects.
            - Designed new cooling solutions for wind turbine generators.
            - Prepared cost calculations for complete cooling solutions.
            - Managed supplier meetings to improve relationships, and lower manufacturing costs.
            - Provided technical support for the Heatex sales team and European clients.
            - Commissioned complete cooling solution for clients in China.

      - role: Master Thesis Employee
        time: 2010, Nov - 2011, Oct
        company: Siemens Industrial Turbomachinery, Finspång (Sweden)
        details: |
            - Master thesis: The effect of manufacturing tolerances on the performance of a gas turbine.

